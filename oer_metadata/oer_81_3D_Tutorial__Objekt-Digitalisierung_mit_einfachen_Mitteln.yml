name: '3D Tutorial: Objekt-Digitalisierung mit einfachen Mitteln'
description: 'Dieses 3D Tutorial gibt einen Einblick in die Digitalisierung von Objekten mit einfachen Mitteln und Apps. Dieser Kurs ist für alle Personen gedacht, die noch keine Erfahrung mit 3D Digitalisierung haben oder diejenigen, die ihr Wissen gerne auffrischen möchten.&nbsp;In diesem Tutorial wird vor allem die einfache Digitalisierung und Publikation über Smartphone Apps vorgestellt und der 3D-Digitalisierungsprozess in seiner Gänze kurz vorgestellt, um in weiteren Workshops und Tutorials auf diesem Vorwissen aufbauen zu können.'
