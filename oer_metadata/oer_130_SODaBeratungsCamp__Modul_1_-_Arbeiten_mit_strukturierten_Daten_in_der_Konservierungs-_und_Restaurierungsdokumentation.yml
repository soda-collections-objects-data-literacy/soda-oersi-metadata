name: 'SODaBeratungsCamp: Modul 1 - Arbeiten mit strukturierten Daten in der Konservierungs- und Restaurierungsdokumentation'
description: 'Von der Theorie in die Praxis - erläutern und analysieren&nbsp;Das Modul SODa BeratungsCamp – Arbeiten mit strukturierten Daten in der Konservierungs- und Restaurierungsdokumentation vermittelt grundlegende Datenkompetenzen für wissenschaftliche Sammlungen und führt in kontextbezogene Praktiken des Forschungsdatenmanagements (FDM) sowie der Dokumentation konservatorischer und restauratorischer Maßnahmen ein. Die Open Educational Resource (OER) wurde als Präsenz-Workshop erprobt und im Train-the-Trainer-Format veröffentlicht.In zwei Einheiten werden zentrale Begriffe, Rollen, Herausforderungen, Standards und Prozesse strukturiert erarbeitet und durch aktivierende Methoden vertieft. Die Teilnehmenden reflektieren eigene Rollen, Bedarfe und Datenpraktiken, ordnen Maßnahmen entlang des Datenlebenszyklus zu und analysieren Dokumentationsanforderungen in ihrem Arbeitskontext. Fachspezifische Grundlagen – etwa Grundsatzpapiere der E.C.C.O., Dokumentationsanforderungen in der Konservierung und Restaurierung sowie aktuelle Entwicklungen zu Metadatenstandards und kontrollierten Vokabularen – bilden einen weiteren Schwerpunkt.Das Modul stärkt datenbezogene Handlungskompetenzen in heterogenen Sammlungsumgebungen und unterstützt den professionellen Umgang mit strukturierten Daten als Grundlage für langfristige Erhaltung, Nutzbarkeit und Nachvollziehbarkeit wissenschaftlicher Objekte und Prozesse.Das verlinkte Related Work stellt die ursprüngliche Version des didaktischen Konzepts dar. Dieses wurde in weiteren Durchführungen erprobt und zur hier vorliegenden aktuellen Fassung weiterentwickelt.SODa: Dieses Projekt mit dem Förderkennzeichen 16DKZ2016B wurde durch das Bundesministerium für Bildung und Forschung (BMBF) und NextGenerationEU (NGEU) gefördert.&nbsp;&nbsp;'
