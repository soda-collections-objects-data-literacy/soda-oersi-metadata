name: 'OpenRefine Einführung'
description: 'Dieses Tutorial kann als Material für unseren Einführungs-Workshop oder als Selbstlern-Ressource genutzt werden.&nbsp;OpenRefine ist ein leistungsstarkes Open-Source-Tool zur Datenbereinigung und -transformation, das im GLAM-Bereich (Galleries, Libraries, Archives, Museums) und in Universitätssammlungen wertvolle Dienste leistet. Gerade hier, wo heterogene und historisch gewachsene Datensätze oft inkonsistente Metadaten aufweisen, hilft OpenRefine.Das Tool kann:praktisch alle Text-Dateiformate und Datenstrukturen wie CSV, XML, JSON importiereneinen schnellen Überblick über Dateien mit zehntausenden Zeilen schaffenBereinigungs- und Sortieraufgaben durchführen, etwa vor dem Import von Daten in ein neues Dokumentationssystemdurch Zugriff auf Webseiten und Schnittstellen diese Daten verarbeiten (z. B. für einen Abgleich mit der GND, Wikidata, OpenStreetMap usw.)wiederholbare, komplexe Bearbeitungsschritte mit Hilfe der eigenen Skriptsprache GREL durchführen, die ganze Spalten oder die ganze Tabelle betreffenbei der Transformation in andere Datenformate (Export) unterstützenOb zur Vorbereitung digitaler Sammlungen, für Systemmigrationen oder zur besseren Integration in Forschungsinfrastrukturen – OpenRefine erleichtert die Arbeit mit Metadaten erheblich und trägt dazu bei, Sammlungen besser zu erschließen und nachhaltig nutzbar zu machen.Die Kursdateien können auf unserem SODa Repository gefunden werden.&nbsp;Ein kleines CheatSheet zu hilfreichen GREL (General Refine Expression Language) Audrücken in OpenRefine haben wir in unserem InfoSnack: OpenRefine für die Datenbereinigung auf Zenodo veröffentlicht.&nbsp;'
