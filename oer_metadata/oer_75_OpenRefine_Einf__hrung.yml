name: 'OpenRefine Einführung'
description: 'Dieser Kurs kann als Material für unseren Einführungs-Workshop oder als Selbstlern-Ressource genutzt werden.&nbsp;OpenRefine ist ein leistungsstarkes Open-Source-Tool zur Datenbereinigung und -transformation, das im GLAM-Bereich (Galleries, Libraries, Archives, Museums) und in Universitätssammlungen wertvolle Dienste leistet. Gerade hier, wo heterogene und historisch gewachsene Datensätze oft inkonsistente Metadaten aufweisen, hilft OpenRefine.Der Kurs führt in die grundlegende Funktion von OpenRefine ein und behandelt folgende Anwendungsfälle:Daten bereinigen und ordnen, z.B. Personenansetzungen abgleichen und korrigieren, überflüssige Leerzeichen löscheURLs auftrennen und korrigierenClustern von Begriffen zur Vereinheitlichung von SchreibweisenKomplexe Freitextangaben wie Maßangaben oder Inventarnummern aufteilenKoordinaten zu Ortsnamen aus OpenStreetMap holenReconciling: Identification von Entitäten in z.B. in der GND oder WikidataOpenRefine kannpraktisch alle Text-Dateiformate und Datenstrukturen wie CSV, XML, JSON importieren.einen schnellen Überblick über Dateien mit zehntausenden Zeilen schaffen.Bereinigungs- und Sortieraufgaben durchführen, etwa vor dem Import von Daten in ein neues Dokumentationssystem.durch Zugriff auf Webseiten und Schnittstellen diese Daten verarbeiten (z. B. für einen Abgleich mit der GND, Wikidata, OpenStreetMap usw.).wiederholbare, komplexe Bearbeitungsschritte mit Hilfe der eigenen Skriptsprache GREL durchführen, die ganze Spalten oder die ganze Tabelle betreffen.bei der Transformation in andere Datenformate (Export) unterstützen.Ob zur Vorbereitung digitaler Sammlungen, für Systemmigrationen oder zur besseren Integration in Forschungsinfrastrukturen – OpenRefine erleichtert die Arbeit mit Metadaten erheblich und trägt dazu bei, Sammlungen besser zu erschließen und nachhaltig nutzbar zu machen.Ein kleines CheatSheet zu hilfreichen GREL (General Refine Expression Language) Audrücken in OpenRefine haben wir in unserem InfoSnack: OpenRefine für die Datenbereinigung auf Zenodo veröffentlicht.'
